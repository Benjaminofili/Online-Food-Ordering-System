{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center mb-4 mt-3">
    <h2 class="fw-bold mb-0"><i class="bi bi-credit-card me-2 text-warning"></i>Secure Checkout</h2>
</div>
<div class="row mt-4 g-4 mb-5">
    <div class="col-lg-8">
        <div class="card bg-dark border-secondary shadow-sm h-100">
            <div class="card-header bg-black bg-opacity-25 border-secondary py-3 fw-bold text-uppercase letter-spacing-wide small text-muted">
                Delivery & Payment Details
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase fw-bold">Delivery Address</label>
                        <textarea name="address" class="form-control bg-black border-secondary text-light" rows="3" required placeholder="Enter your full delivery address...">{{ current_user.address }}</textarea>
                    </div>
                    <div class="mb-5">
                        <label class="form-label text-muted small text-uppercase fw-bold">Payment Method</label>
                        <select name="payment_method" class="form-select bg-black border-secondary text-light" required>
                            <option value="cash">Cash on Delivery</option>
                            <option value="card_online">Credit Card (Online)</option>
                        </select>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg py-3 rounded-pill shadow-sm fw-bold">Confirm & Place Order <i class="bi bi-check2-circle ms-2"></i></button>
                    </div>
                    <div class="text-center mt-3">
                        <a href="{{ url_for('customer.view_cart') }}" class="btn btn-link text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Return to Cart</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-4">
        <div class="card bg-dark border-secondary shadow-sm">
            <div class="card-header bg-black bg-opacity-25 border-secondary py-3 fw-bold text-uppercase letter-spacing-wide small text-muted">
                Order Summary
            </div>
            <div class="card-body p-4">
                <div class="d-flex align-items-center mb-4 pb-3 border-bottom border-secondary">
                    <div class="bg-primary bg-opacity-10 p-2 rounded me-3">
                        <i class="bi bi-shop text-primary"></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-0">Fulfilling Restaurant</p>
                        <p class="fw-bold mb-0 text-light">{{ restaurant.name }}</p>
                    </div>
                </div>
                
                <div class="d-flex justify-content-between mb-2 text-muted">
                    <span>Subtotal</span>
                    <span class="text-light">${{ "%.2f"|format(total) }}</span>
                </div>
                <div class="d-flex justify-content-between mb-4 text-muted border-bottom border-secondary pb-4">
                    <span>Standard Delivery</span>
                    <span class="text-success fw-bold">Free</span>
                </div>
                
                <div class="d-flex justify-content-between align-items-center">
                    <span class="text-uppercase text-muted letter-spacing-wide fw-bold small">Total to Pay</span>
                    <span class="fs-2 fw-bold text-warning">${{ "%.2f"|format(total) }}</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
