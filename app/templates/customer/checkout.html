{% extends "base.html" %}
{% block content %}
<h2>Checkout</h2>
<div class="row mt-4">
    <div class="col-md-8">
        <div class="card mb-4">
            <div class="card-header">Delivery & Payment</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Delivery Address</label>
                        <textarea name="address" class="form-control" rows="3" required>{{ current_user.address }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Payment Method</label>
                        <select name="payment_method" class="form-select" required>
                            <option value="cash">Cash on Delivery</option>
                            <option value="card_online">Credit Card (Online)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg mt-3 w-100">Confirm Order</button>
                    <a href="{{ url_for('customer.view_cart') }}" class="btn btn-secondary mt-3 d-block">Back to Cart</a>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">Order Summary</div>
            <div class="card-body">
                <p><strong>Restaurant:</strong> {{ restaurant.name }}</p>
                <hr>
                <div class="d-flex justify-content-between">
                    <span>Subtotal</span>
                    <span>${{ "%.2f"|format(total) }}</span>
                </div>
                <div class="d-flex justify-content-between mt-2">
                    <span>Delivery Fee</span>
                    <span>$0.00</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between fs-5 fw-bold">
                    <span>Total</span>
                    <span>${{ "%.2f"|format(total) }}</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
