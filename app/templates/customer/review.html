{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-4 mb-5">
    <div class="col-md-8 col-lg-6">
        <div class="card bg-dark border-secondary shadow-sm p-4">
            <div class="d-flex align-items-center mb-4 pb-3 border-bottom border-secondary">
                <div class="bg-warning bg-opacity-10 p-2 rounded flex-shrink-0 me-3">
                    <i class="bi bi-star-fill fs-4 text-warning"></i>
                </div>
                <div>
                    <h3 class="fw-bold mb-0 text-light">Rate Your Experience</h3>
                    <p class="text-muted small mb-0">with {{ restaurant.name }}</p>
                </div>
            </div>
            
            <form method="POST" class="mt-2">
                <div class="mb-4">
                    <label class="form-label text-muted small text-uppercase fw-bold">Overall Rating</label>
                    <div class="input-group">
                        <span class="input-group-text bg-black border-secondary text-warning"><i class="bi bi-star-fill"></i></span>
                        <select name="rating" class="form-select form-select-lg bg-black border-secondary text-light fw-bold" required>
                            <option value="" disabled {% if not review %}selected{% endif %}>Select a rating (1-5)</option>
                            <option value="5" {% if review and review.rating == 5 %}selected{% endif %}>★★★★★ - Excellent</option>
                            <option value="4" {% if review and review.rating == 4 %}selected{% endif %}>★★★★☆ - Very Good</option>
                            <option value="3" {% if review and review.rating == 3 %}selected{% endif %}>★★★☆☆ - Good</option>
                            <option value="2" {% if review and review.rating == 2 %}selected{% endif %}>★★☆☆☆ - Fair</option>
                            <option value="1" {% if review and review.rating == 1 %}selected{% endif %}>★☆☆☆☆ - Poor</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-muted small text-uppercase fw-bold">Your Review Comments</label>
                    <textarea name="comment" class="form-control bg-black border-secondary text-light" rows="5" placeholder="Share details of your experience, food quality, delivery speed...">{{ review.comment if review else '' }}</textarea>
                </div>
                
                <div class="d-flex justify-content-end gap-3 pt-4 border-top border-secondary">
                    <a href="{{ url_for('customer.my_orders') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                    <button type="submit" class="btn btn-warning rounded-pill px-5 shadow-sm fw-bold text-dark"><i class="bi bi-send-fill me-1"></i> Submit Review</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
