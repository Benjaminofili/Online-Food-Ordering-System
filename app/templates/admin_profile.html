{% extends 'base_admin.html' %}

{% block title %}Admin Profile{% endblock %}

{% block content %}
<h1 class="mt-4 mb-4">Admin Profile Management</h1>

<div class="row">
    <!-- Profile Info Form -->
    <div class="col-xl-8 col-lg-7 mb-4">
        <div class="card shadow h-100">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Update Personal Information</h6>
            </div>
            <div class="card-body">
                <form action="{{ url_for('admin.profile') }}" method="POST">
                    <input type="hidden" name="action" value="update_info">
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label for="name">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ current_user.name }}" required>
                        </div>
                        <div class="form-group col-md-6">
                            <label for="email">Email Address (Read Only)</label>
                            <input type="email" class="form-control" id="email" value="{{ current_user.email }}" readonly disabled>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="text" class="form-control" id="phone" name="phone" value="{{ current_user.phone or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea class="form-control" id="address" name="address" rows="3">{{ current_user.address or '' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3">
                        <i class="fas fa-save mr-1"></i> Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Security Form -->
    <div class="col-xl-4 col-lg-5 mb-4">
        <div class="card shadow h-100">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-danger">Security & Password</h6>
            </div>
            <div class="card-body">
                <form action="{{ url_for('admin.profile') }}" method="POST">
                    <input type="hidden" name="action" value="update_password">
                    <div class="form-group">
                        <label for="current_password">Current Password</label>
                        <input type="password" class="form-control" id="current_password" name="current_password" required>
                    </div>
                    <div class="form-group">
                        <label for="new_password">New Password</label>
                        <input type="password" class="form-control" id="new_password" name="new_password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirm New Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                    <button type="submit" class="btn btn-danger mt-3 btn-block">
                        <i class="fas fa-key mr-1"></i> Update Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
