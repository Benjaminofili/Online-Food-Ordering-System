<div class="container mt_30">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category if category != 'message' else 'info' }} alert-dismissible fade show border-0 shadow-sm" role="alert" style="border-radius: 10px; background-color: {{ '#fff3cd' if category == 'warning' else '#f8d7da' if category == 'danger' else '#d1e7dd' if category == 'success' else '#cfe2ff' }}; color: {{ '#664d03' if category == 'warning' else '#842029' if category == 'danger' else '#0f5132' if category == 'success' else '#084298' }};">
                    <i class="fas {{ 'fa-exclamation-triangle' if category == 'warning' else 'fa-times-circle' if category == 'danger' else 'fa-check-circle' if category == 'success' else 'fa-info-circle' }} me-2"></i>
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</div>
