{% extends "base.html" %}

{% block title %}RegFood || Sign Up{% endblock %}

{% block content %}
    <!--=============================
        BREADCRUMB START
    ==============================-->
    <section class="page_breadcrumb" style="background: url({{ url_for('static', filename='regfood/images/counter_bg.jpg') }});">
        <div class="breadcrumb_overlay">
            <div class="container">
                <div class="breadcrumb_text">
                    <h1>sign up</h1>
                    <ul>
                        <li><a href="{{ url_for('customer.dashboard') }}">home</a></li>
                        <li><a href="{{ url_for('auth.register') }}">sign up</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </section>
    <!--=============================
        BREADCRUMB END
    ==============================-->


    <!--=========================
        SIGN UP START
    ==========================-->
    <section class="signin pt_100 xs_pt_70 pb_100 xs_pb_70">
        <div class=" container">
            <div class="row justify-content-center wow fadeInUp" data-wow-duration="1s">
                <div class="col-xl-5 col-sm-10 col-md-8 col-lg-6">
                    <div class="login_area">
                        <h2>Welcome back!</h2>
                        <p>sign up to continue</p>
                        <form method="POST" action="">
                            {{ form.csrf_token }}
                            <div class="row">
                                <div class="col-xl-12">
                                    <div class="login_imput">
                                        <input type="text" name="name" placeholder="Name" required>
                                    </div>
                                </div>
                                <div class="col-xl-12">
                                    <div class="login_imput">
                                        <input type="email" name="email" placeholder="Email" required>
                                    </div>
                                </div>
                                <div class="col-xl-12">
                                    <div class="login_imput">
                                        <input type="password" name="password" placeholder="Password" required>
                                    </div>
                                </div>
                                <div class="col-xl-12">
                                    <div class="login_imput">
                                        <input type="password" name="password2" placeholder="Confirm Password" required>
                                    </div>
                                </div>
                                <div class="col-xl-12">
                                    <div class="login_imput">
                                        <select name="role" class="form-select" style="height: 50px; width: 100%; border: 1px solid #eee; padding: 0 20px; font-weight: 500; font-size: 16px; border-radius: 5px; outline: none; box-shadow: 0px 5px 20px 0px rgba(8, 114, 250, 0.05);" required>
                                            <option value="customer">I am a Customer</option>
                                            <option value="owner">I am a Restaurant Owner</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-xl-12 mt-3">
                                    <div class="login_imput">
                                        <button type="submit" class="common_btn">sign up</button>
                                    </div>
                                </div>
                            </div>
                        </form>
                        <p class="or"><span>or</span></p>
                        <ul class="d-flex">
                            <li><a href="#"><i class="fab fa-facebook-f"></i></a></li>
                            <li><a href="#"><i class="fab fa-linkedin-in"></i></a></li>
                            <li><a href="#"><i class="fab fa-twitter"></i></a></li>
                            <li><a href="#"><i class="fab fa-google-plus-g"></i></a></li>
                        </ul>
                        <p class="create_account">Dont’t have an aceount ? <a href="{{ url_for('auth.login') }}">login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!--=========================
        SIGN UP END
    ==========================-->
{% endblock %}
ml>
