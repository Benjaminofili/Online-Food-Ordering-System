{% extends "base.html" %}
{% block content %}
<h2>{{ 'Edit' if dish else 'Add' }} Dish</h2>
<form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="form-label">Dish Name</label>
        <input type="text" name="name" class="form-control" value="{{ dish.name if dish else '' }}" required>
    </div>
    
    <div class="row mb-3">
        <div class="col">
            <label class="form-label">Category</label>
            <select name="category_id" class="form-select">
                {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if dish and dish.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col">
            <label class="form-label">Food Type</label>
            <select name="food_type_id" class="form-select">
                {% for ft in food_types %}
                    <option value="{{ ft.id }}" {% if dish and dish.food_type_id == ft.id %}selected{% endif %}>{{ ft.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    
    <div class="mb-3">
        <label class="form-label">Price</label>
        <input type="number" step="0.01" name="price" class="form-control" value="{{ dish.price if dish else '' }}" required>
    </div>
    
    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control">{{ dish.description if dish else '' }}</textarea>
    </div>
    
    <div class="mb-3">
        <label class="form-label">Upload Dish Image (Optional)</label>
        <input type="file" name="image" class="form-control" accept="image/*">
        {% if dish and dish.image_url %}
            <div class="mt-2">
                <p class="mb-1 text-muted small">Current Image:</p>
                <img src="{{ dish.image_url }}" alt="dish" height="50">
            </div>
        {% endif %}
    </div>
    
    <div class="mb-3 form-check">
        <input type="checkbox" name="is_available" class="form-check-input" id="is_available" {% if not dish or dish.is_available %}checked{% endif %}>
        <label class="form-check-label" for="is_available">Is Available</label>
    </div>
    
    <button type="submit" class="btn btn-primary">Save Dish</button>
    <a href="{{ url_for('owner.dishes') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
