{% extends "base.html" %}
{% block content %}
<h2>Restaurant Profile</h2>
<form method="POST" action="{{ url_for('owner.profile') }}" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="form-label">Restaurant Name</label>
        <input type="text" name="name" class="form-control" value="{{ restaurant.name if restaurant else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Address</label>
        <textarea name="address" class="form-control" required>{{ restaurant.address if restaurant else '' }}</textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">Contact Number</label>
        <input type="text" name="contact" class="form-control" value="{{ restaurant.contact if restaurant else '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control">{{ restaurant.description if restaurant else '' }}</textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">Upload Logo (Optional)</label>
        <input type="file" name="logo" class="form-control" accept="image/*">
        {% if restaurant and restaurant.logo_url %}
            <div class="mt-2">
                <p class="mb-1 text-muted small">Current Logo:</p>
                <img src="{{ restaurant.logo_url }}" alt="logo" height="50">
            </div>
        {% endif %}
    </div>
    <button type="submit" class="btn btn-primary">Save Profile</button>
    <a href="{{ url_for('owner.dashboard') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
